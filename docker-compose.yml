services:
  disico-dashboard:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_PATH=/app/data
      - CACHE_PATH=/app/data/cache
      - PYTHONUNBUFFERED=1
      # Control de datos de ejemplo:
      #   auto     — genera datos de ejemplo si faltan archivos (default)
      #   generate — siempre regenera datos de ejemplo
      #   clean    — elimina datos de ejemplo, usa solo datos reales
      #   off      — no verifica nada, arranca directo
      - DUMMY_DATA=off
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G