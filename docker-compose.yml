services:
  disico-dashboard:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_PATH=/app/data
      - CACHE_PATH=/app/data/cache
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-disico-prod-cambiar-esta-clave}
      - AUTH_USER1_NAME=jorgerios
      - AUTH_USER1_EMAIL=jorgerios@disico.com.co
      - AUTH_USER1_PASS=SW*rios26
      - AUTH_USER2_NAME=invitado26
      - AUTH_USER2_EMAIL=
      - AUTH_USER2_PASS=invitado@26*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 3G